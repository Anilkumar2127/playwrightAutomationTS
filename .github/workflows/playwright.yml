name: Playwright Tests
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: #manual trigger button in github ui
jobs:
  test:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    
    steps:
    - name: checkout code  
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: 'npm'

    - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('package-lock.json') }}

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright Browsers
      if: steps.playwright-cache.outputs.cache-hit != 'true'
      run: npx playwright install --with-deps

    - name: Install Playwright OS deps only (if cached)
      if: steps.playwright-cache.outputs.cache-hit == 'true'
      run: npx playwright install-deps 
      
      # =========================
      # 🟦 UI TESTS STAGE
      # =========================
    
    - name: Run UI Playwright tests
      run: npm run tagged_ui_tests

      env:
        ENV : preprod
        URL : ${{ secrets.URL}}
        APIBASEURL: ${{ secrets.APIBASEURL}}
        TOKEN : ${{secrets.TOKEN}}

    - name : Upload ui HTML report
      if: always()    
      uses: actions/upload-artifact@v4
      with:
        name: playwright-html-report
        path: reports/uifinalreport
        retention-days: 30

        
      # =========================
      # 🟩 API TESTS STAGE
      # =========================   
    - name: Run API Playwright tests
      run: npm run tagged_api_tests

      env:
        ENV : preprod
        URL : ${{ secrets.URL}}
        APIBASEURL: ${{ secrets.APIBASEURL}}
        TOKEN : ${{secrets.TOKEN}}

    - name : Upload api HTML report
      if: always()    
      uses: actions/upload-artifact@v4
      with:
        name: playwright-html-report
        path: reports/apifinalreport
        retention-days: 30
